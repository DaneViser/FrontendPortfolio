<header>
  <nav>
    <a routerLink="/" class="site-title">Danijel Stokić Portfolio App</a>

    <button class="hamburger" [class.active]="isMenuOpen" (click)="toggleMenu()">
      <span></span>
      <span></span>
      <span></span>
    </button>

    <div class="nav-menu" [class.open]="isMenuOpen">
      
      <div class="nav-links">
        <a routerLink="/home" routerLinkActive="active" (click)="closeMenu()">Home</a>
        <a routerLink="/project" routerLinkActive="active" (click)="closeMenu()">Projects</a>
        <a routerLink="/about" routerLinkActive="active" (click)="closeMenu()">About</a>
      </div>

      @if (!authService.isLoggedIn) {
        <div class="login-link">
          <a routerLink="/login" routerLinkActive="active" (click)="closeMenu()">Login</a>
        </div>
      }
      @else {
        <div class="user-info">
          <span>Welcome, {{ authService.username }} !</span>
          <button (click)="authService.logout(); closeMenu()">Logout</button>
        </div>
      }
      
    </div>
  </nav>
</header>

<main>
  <router-outlet></router-outlet>
</main>

<footer>
  <p>&copy; 2025 MyApp. All Rights Reserved.</p>
  <div class="footer-links">
    <a href="#">Privacy Policy</a>
    <span>|</span>
    <a href="#">Terms of Service</a>
  </div>
</footer>
